services:
  stock-ml:
    build: .
    image: stock-cloud-ml-platform:latest
    working_dir: /app
    environment:
      PYTHONUNBUFFERED: "1"
      JAVA_HOME: /usr/lib/jvm/java-21-openjdk-amd64
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./models:/app/models
    command: make smoke
