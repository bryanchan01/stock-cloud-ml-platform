  ticker_file: null
  start_date: "2018-01-01"
  end_date: null
  interval: "1d"
  auto_adjust: true
  raw_csv_path: "data/raw/prices.csv"
  raw_parquet_path: "data/raw/prices.parquet"

features:
  output_path: "data/processed/features.parquet"
  forecast_horizon_days: 1
  moving_average_windows: [5, 10, 20]
  volatility_window: 20
  lag_return_days: [1, 2, 3, 5]

spark:
  master: "local[*]"
  app_name: "StockCloudML"
  shuffle_partitions: 8
  output_partitions: 4
  driver_memory: "2g"

model:
  train_end_date: "2024-01-01"
  train_fraction_if_no_split_date: 0.8
  default_model: "logistic_regression"
  features:
    - daily_return
    - ma5
    - ma10
    - ma20
    - rolling_volatility_20
    - volume_change
    - return_lag_1
    - return_lag_2
    - return_lag_3
    - return_lag_5
  label_col: "label"
  prediction_output_dir: "data/predictions"
  metrics_output_path: "data/results/model_metrics.csv"
  model_output_dir: "models"
  logistic_regression:
    max_iter: 50
    reg_param: 0.01
    elastic_net_param: 0.0
  random_forest:
    num_trees: 80
    max_depth: 6

backtest:
  transaction_cost: 0.001
  risk_free_rate: 0.0
  trading_days_per_year: 252
  prediction_path: "data/predictions/logistic_regression_predictions.parquet"
  metrics_output_path: "data/results/backtest_metrics.csv"
  equity_curve_output_path: "data/results/equity_curve.csv"

benchmark:
  ticker_counts: [3, 10]
  partition_counts: [1, 2, 4]
  results_path: "data/results/benchmark_results.csv"
  plots_dir: "data/results/plots"
  aws_cost:
    region: "us-east-1"
    t3_medium_hourly_usd: 0.0418
    t3_large_hourly_usd: 0.0835

